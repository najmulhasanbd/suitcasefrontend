<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Suitcase BD</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <header>
        <div class="top-bar border-bottom bg-body-tertiary py-2">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-md-4 text-center text-md-start">
                        <small class="text-muted">Welcome you to SUITCASE BD</small>
                    </div>
                    <div class="col-md-4 text-center">
                        <small class="text-success fw-bold d-flex align-items-center justify-content-center">
                            <marquee behavior="scroll" direction="left" scrollamount="5"
                                onmouseover="this.stop();" onmouseout="this.start();">
                                <span style="margin-right: 50px;">🚀 100% Secure delivery 1</span>
                                <span style="margin-right: 50px;">🔒 100% Secure delivery 2</span>
                                <span style="margin-right: 50px;">📦 100% Secure delivery 3</span>
                            </marquee>
                        </small>
                    </div>
                    <div class="col-md-4 d-flex justify-content-center justify-content-md-end align-items-center ">
                        <div class="dropdown me-3">
                            <a class="text-decoration-none text-muted small" href="#">Help</a>
                        </div>

                        <div class="dropdown me-3">
                            <a class="text-decoration-none text-muted small dropdown-toggle" href="#" role="button"
                                id="languageDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                                <img src="https://flagcdn.com/w20/gb.png" class="me-1" alt="English"> English
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0"
                                aria-labelledby="languageDropdown">
                                <li>
                                    <a class="dropdown-item small d-flex align-items-center" href="#">
                                        <img src="https://flagcdn.com/w20/gb.png" class="me-2" alt="English"> English
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item small d-flex align-items-center" href="#">
                                        <img src="https://flagcdn.com/w20/bd.png" class="me-2" alt="Bangla"> Bangla
                                    </a>
                                </li>
                            </ul>
                        </div>

                        <div class="btn-sm btn-outline-secondary me-3" id="darkModeToggle">
                            <i class="fas fa-moon"></i>
                        </div>

                        <a href="#"
                            class="btn btn-warning btn-sm fw-bold px-3 d-none d-lg-block text-dark header__account">Account</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="middle-header bg-white border-bottom bg-body-tertiary py-1">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-3 col-md-3 col-6">
                        <div class="logo">
                            <a href="index.html">
                                <img src="images/logo.png" alt="Suitcase BD" class="img-fluid"
                                    style="max-height: 50px;">
                            </a>
                        </div>
                    </div>
                    <div class="col-lg-6 col-md-6 d-none d-md-block">
                        <form action="" method="post">
                            <div class="input-group">
                                <input type="text" class="form-control"
                                    placeholder="Search for products, brands and more" aria-label="Search">
                                <button class="btn btn-outline-secondary" type="submit"><i
                                        class="fas fa-search"></i></button>
                            </div>
                        </form>
                    </div>
                    <div class="col-lg-3 col-md-3 col-6 text-end d-flex align-items-center justify-content-end">
                        <div class="d-flex align-items-center me-3 p-2 rounded shadow-sm">
                            <div class="bg-light rounded-circle p-2 me-2 d-flex align-items-center justify-content-center"
                                style="width: 40px; height: 40px;">
                                <i class="fas fa-phone-alt text-danger"></i>
                            </div>
                            <div class="lh-1">
                                <small class="text-start text-muted d-block" style="font-size: 11px;">Need help? Call
                                    us</small>
                                <strong style="color: var(--primary-color);">01603580981</strong>
                            </div>
                        </div>
                        <a href="#" class="text-decoration-none text-muted position-relative">
                            <i class="fas fa-shopping-cart fa-lg"></i>
                            <span
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                                0
                            </span>
                        </a>
                    </div>
                </div>
            </div>
        </div>


    </header>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
